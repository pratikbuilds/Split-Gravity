appId: com.pratik.myexpoapp
---
- launchApp
- tapOn: "http://localhost:8081"
- tapOn: "Continue"
- tapOn: "MULTIPLAYER"
- tapOn:
    text: "FREE.*Casual Room.*"
- tapOn: "Enter your nickname"
- inputText: "Bravo"
- tapOn: "Join Room"
- tapOn: "ROOM CODE"
- inputText: "${ROOM_CODE}"
- tapOn: "Join Room"
- assertVisible: "ROOM CODE"
